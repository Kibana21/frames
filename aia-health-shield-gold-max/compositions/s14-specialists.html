<template id="scene14-specialists-template">
  <div
    data-composition-id="scene14-specialists"
    data-width="1920"
    data-height="1080"
    data-duration="4"
  >
    <style>
      [data-composition-id="scene14-specialists"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        font-family: 'Inter', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      [data-composition-id="scene14-specialists"] .inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      [data-composition-id="scene14-specialists"] .eyebrow {
        font-size: 20px;
        font-weight: 600;
        color: #DA2032;
        text-transform: uppercase;
        letter-spacing: 0.28em;
        margin-bottom: 32px;
        opacity: 0;
      }

      [data-composition-id="scene14-specialists"] .stat-number {
        font-size: 200px;
        font-weight: 900;
        line-height: 1;
        background: linear-gradient(180deg, #fff 0%, #C9A84C 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        opacity: 0;
        margin-bottom: 16px;
      }

      [data-composition-id="scene14-specialists"] .stat-label {
        font-size: 40px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 48px;
        opacity: 0;
      }

      [data-composition-id="scene14-specialists"] .gold-rule {
        height: 4px;
        width: 0;
        background: linear-gradient(90deg, #C9A84C, #E8D5A3);
        border-radius: 2px;
        margin-bottom: 56px;
      }

      [data-composition-id="scene14-specialists"] .sub-stats {
        display: flex;
        align-items: flex-start;
        gap: 80px;
        opacity: 0;
      }

      [data-composition-id="scene14-specialists"] .sub-stat {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      [data-composition-id="scene14-specialists"] .sub-stat-num {
        font-size: 48px;
        font-weight: 700;
        color: #ffffff;
      }

      [data-composition-id="scene14-specialists"] .sub-stat-lbl {
        font-size: 20px;
        color: rgba(255, 255, 255, 0.5);
      }

      [data-composition-id="scene14-specialists"] .sub-divider {
        width: 1px;
        height: 80px;
        background: rgba(201, 168, 76, 0.35);
        align-self: center;
      }

      [data-composition-id="scene14-specialists"] .fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <div class="inner">
      <div class="eyebrow">AIA Preferred Providers</div>
      <div class="stat-number">380+</div>
      <div class="stat-label">specialist doctors</div>
      <div class="gold-rule"></div>
      <div class="sub-stats">
        <div class="sub-stat">
          <span class="sub-stat-num">5+ years</span>
          <span class="sub-stat-lbl">of experience each</span>
        </div>
        <div class="sub-divider"></div>
        <div class="sub-stat">
          <span class="sub-stat-num">Pan-Asian</span>
          <span class="sub-stat-lbl">network coverage</span>
        </div>
      </div>
    </div>

    <div class="fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene14-specialists"]';
        const el = (cls) => document.querySelector(sc + ' ' + cls);

        const tl = gsap.timeline({ paused: true });

        gsap.set(el('.stat-number'), { y: -80, opacity: 0 });
        gsap.set(el('.eyebrow'), { opacity: 0 });
        gsap.set(el('.stat-label'), { opacity: 0 });
        gsap.set(el('.sub-stats'), { opacity: 0 });
        gsap.set(el('.gold-rule'), { width: 0 });
        gsap.set(el('.fade'), { opacity: 0 });

        tl
          .to(el('.eyebrow'), { opacity: 1, duration: 0.2, ease: 'power2.out' }, 0)
          .to(el('.stat-number'), { y: 0, opacity: 1, duration: 0.7, ease: 'expo.out' }, 0.35)
          .to(el('.stat-label'), { opacity: 1, duration: 0.7, ease: 'power2.out' }, 0.7)
          .to(el('.gold-rule'), { width: 560, duration: 0.6, ease: 'power3.out' }, 0.95)
          .to(el('.sub-stats'), { opacity: 1, duration: 0.5, ease: 'power2.out' }, 1.2)
          .to(el('.fade'), { opacity: 1, duration: 0.4, ease: 'power2.inOut' }, 3.6);

        window.__timelines = window.__timelines || {};
        window.__timelines['scene14-specialists'] = tl;
      })();
    </script>
  </div>
</template>
