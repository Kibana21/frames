<template id="scene24-trust-template">
  <div
    data-composition-id="scene24-trust"
    data-width="1920"
    data-height="1080"
    data-duration="3.5"
  >
    <style>
      [data-composition-id="scene24-trust"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        font-family: 'Inter', sans-serif;
        display: flex;
        align-items: center;
        overflow: hidden;
      }

      [data-composition-id="scene24-trust"] .red-stripe {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 8px;
        background: #DA2032;
      }

      [data-composition-id="scene24-trust"] .content {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding-left: 160px;
        width: 100%;
        max-width: 1700px;
      }

      [data-composition-id="scene24-trust"] .eyebrow {
        font-size: 20px;
        font-weight: 600;
        color: #DA2032;
        text-transform: uppercase;
        letter-spacing: 0.28em;
        margin-bottom: 24px;
        opacity: 0;
      }

      [data-composition-id="scene24-trust"] .headline {
        font-size: 80px;
        font-weight: 800;
        color: #ffffff;
        line-height: 1.1;
        margin-bottom: 40px;
        opacity: 0;
      }

      [data-composition-id="scene24-trust"] .gold-rule {
        height: 5px;
        width: 0;
        background: linear-gradient(90deg, #C9A84C, #E8D5A3);
        border-radius: 2px;
        margin-bottom: 56px;
      }

      [data-composition-id="scene24-trust"] .stats-row {
        display: flex;
        align-items: stretch;
        gap: 0;
        margin-bottom: 48px;
        opacity: 0;
      }

      [data-composition-id="scene24-trust"] .stat {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 0 64px 0 0;
      }

      [data-composition-id="scene24-trust"] .stat:first-child {
        padding-left: 0;
      }

      [data-composition-id="scene24-trust"] .stat-num {
        font-size: 64px;
        font-weight: 900;
        color: #ffffff;
        line-height: 1;
      }

      [data-composition-id="scene24-trust"] .stat-lbl {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.5);
        max-width: 200px;
        line-height: 1.4;
      }

      [data-composition-id="scene24-trust"] .stat-divider {
        width: 1px;
        background: rgba(201, 168, 76, 0.4);
        margin: 0 64px 0 0;
        align-self: stretch;
        flex-shrink: 0;
      }

      [data-composition-id="scene24-trust"] .backing-note {
        font-size: 22px;
        color: rgba(255, 255, 255, 0.4);
        line-height: 1.5;
        max-width: 900px;
        opacity: 0;
      }

      [data-composition-id="scene24-trust"] .fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <div class="red-stripe"></div>
    <div class="content">
      <div class="eyebrow">Trusted by Singaporeans</div>
      <div class="headline">AIA in Singapore.</div>
      <div class="gold-rule"></div>
      <div class="stats-row">
        <div class="stat">
          <span class="stat-num">50+</span>
          <span class="stat-lbl">years of presence</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num">3.5M+</span>
          <span class="stat-lbl">customers served</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num">#1</span>
          <span class="stat-lbl">Life insurer in Asia Pacific</span>
        </div>
      </div>
      <div class="backing-note">Backed by AIA Group — one of the world's largest insurance groups.</div>
    </div>

    <div class="fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene24-trust"]';
        const el = (cls) => document.querySelector(sc + ' ' + cls);

        const tl = gsap.timeline({ paused: true });

        gsap.set(el('.eyebrow'), { opacity: 0 });
        gsap.set(el('.headline'), { x: -50, opacity: 0 });
        gsap.set(el('.gold-rule'), { width: 0 });
        gsap.set(el('.stats-row'), { opacity: 0 });
        gsap.set(el('.backing-note'), { opacity: 0 });
        gsap.set(el('.fade'), { opacity: 0 });

        tl
          .to(el('.eyebrow'), { opacity: 1, duration: 0.15, ease: 'power2.out' }, 0)
          .to(el('.headline'), { x: 0, opacity: 1, duration: 0.6, ease: 'power3.out' }, 0.3)
          .to(el('.gold-rule'), { width: 520, duration: 0.55, ease: 'power3.out' }, 0.65)
          .to(el('.stats-row'), { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.85)
          .to(el('.backing-note'), { opacity: 1, duration: 0.5, ease: 'power2.out' }, 1.1)
          .to(el('.fade'), { opacity: 1, duration: 0.4, ease: 'power2.inOut' }, 3.1);

        window.__timelines = window.__timelines || {};
        window.__timelines['scene24-trust'] = tl;
      })();
    </script>
  </div>
</template>
