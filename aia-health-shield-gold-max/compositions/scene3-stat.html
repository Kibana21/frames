<template id="scene3-stat-template">
  <div
    data-composition-id="scene3-stat"
    data-width="1920"
    data-height="1080"
    data-duration="5"
  >
    <div class="s3-canvas">
      <!-- Left red accent -->
      <div class="s3-left-accent"></div>

      <!-- Main content -->
      <div class="s3-content">
        <div class="s3-label-up">Up to</div>
        <div class="s3-amount" id="s3-amount">S$2,000,000</div>
        <div class="s3-per-year">coverage per policy year</div>
        <div class="s3-divider"></div>
        <div class="s3-unlimited">+ Unlimited lifetime claim amount</div>
      </div>

      <!-- Plan tier pills -->
      <div class="s3-plans">
        <div class="s3-plan" id="s3-pa">
          <div class="s3-plan-label">Plan A</div>
          <div class="s3-plan-amount">S$2,000,000</div>
          <div class="s3-plan-desc">Private Hospital</div>
        </div>
        <div class="s3-plan-sep"></div>
        <div class="s3-plan" id="s3-pb">
          <div class="s3-plan-label">Plan B</div>
          <div class="s3-plan-amount">S$1,000,000</div>
          <div class="s3-plan-desc">Class A Ward</div>
        </div>
        <div class="s3-plan-sep"></div>
        <div class="s3-plan" id="s3-pbl">
          <div class="s3-plan-label">Plan B Lite</div>
          <div class="s3-plan-amount">S$500,000</div>
          <div class="s3-plan-desc">Class A Ward</div>
        </div>
      </div>

      <!-- Fade overlay -->
      <div class="s3-fade"></div>
    </div>

    <style>
      [data-composition-id="scene3-stat"] .s3-canvas {
        width: 1920px;
        height: 1080px;
        background: #09090C;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding-left: 160px;
      }
      [data-composition-id="scene3-stat"] .s3-left-accent {
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 8px;
        background: linear-gradient(180deg, #DA2032 0%, #DA2032 60%, transparent 100%);
        transform-origin: top;
      }
      [data-composition-id="scene3-stat"] .s3-content {
        position: relative;
        z-index: 2;
      }
      [data-composition-id="scene3-stat"] .s3-label-up {
        font-size: 28px;
        font-weight: 500;
        color: #C9A84C;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0;
      }
      [data-composition-id="scene3-stat"] .s3-amount {
        font-size: 168px;
        font-weight: 900;
        color: #ffffff;
        line-height: 1;
        letter-spacing: -0.04em;
        opacity: 0;
        background: linear-gradient(135deg, #ffffff 0%, #E8D5A3 60%, #C9A84C 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      [data-composition-id="scene3-stat"] .s3-per-year {
        font-size: 40px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.65);
        margin-top: 8px;
        opacity: 0;
      }
      [data-composition-id="scene3-stat"] .s3-divider {
        width: 0;
        height: 3px;
        background: rgba(255,255,255,0.15);
        margin: 28px 0;
        border-radius: 2px;
      }
      [data-composition-id="scene3-stat"] .s3-unlimited {
        font-size: 30px;
        font-weight: 500;
        color: #C9A84C;
        letter-spacing: 0.04em;
        opacity: 0;
      }
      [data-composition-id="scene3-stat"] .s3-plans {
        position: absolute;
        right: 120px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 0;
        opacity: 0;
      }
      [data-composition-id="scene3-stat"] .s3-plan {
        padding: 32px 48px;
        text-align: right;
      }
      [data-composition-id="scene3-stat"] .s3-plan-sep {
        width: 100%;
        height: 1px;
        background: rgba(255,255,255,0.1);
      }
      [data-composition-id="scene3-stat"] .s3-plan-label {
        font-size: 18px;
        font-weight: 600;
        color: #DA2032;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      [data-composition-id="scene3-stat"] .s3-plan-amount {
        font-size: 48px;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      [data-composition-id="scene3-stat"] .s3-plan-desc {
        font-size: 18px;
        font-weight: 400;
        color: rgba(255,255,255,0.4);
        margin-top: 4px;
        letter-spacing: 0.05em;
      }
      [data-composition-id="scene3-stat"] .s3-fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene3-stat"]';
        const tl = gsap.timeline({ paused: true });

        gsap.set(`${sc} .s3-left-accent`, { scaleY: 0 });
        gsap.set(`${sc} .s3-amount`, { y: 40 });
        gsap.set(`${sc} .s3-per-year`, { y: 20 });
        gsap.set(`${sc} .s3-unlimited`, { x: -20 });

        tl.to(`${sc} .s3-left-accent`, { scaleY: 1, duration: 0.7, ease: "expo.out" }, 0.0);
        tl.to(`${sc} .s3-label-up`, { opacity: 1, duration: 0.4 }, 0.2);
        tl.to(`${sc} .s3-amount`, { opacity: 1, y: 0, duration: 0.75, ease: "expo.out" }, 0.45);
        tl.to(`${sc} .s3-per-year`, { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 0.9);
        tl.to(`${sc} .s3-divider`, { width: 760, duration: 0.55, ease: "power3.out" }, 1.2);
        tl.to(`${sc} .s3-unlimited`, { opacity: 1, x: 0, duration: 0.5 }, 1.5);
        tl.to(`${sc} .s3-plans`, { opacity: 1, duration: 0.6, ease: "power2.out" }, 1.8);

        tl.to(`${sc} .s3-fade`, { opacity: 1, duration: 0.45, ease: "power2.in" }, 4.55);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene3-stat"] = tl;
      })();
    </script>
  </div>
</template>
