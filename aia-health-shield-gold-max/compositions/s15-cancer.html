      (function () {
        const sc = '[data-composition-id="scene15-cancer"]';
        const el = (cls) => document.querySelector(sc + ' ' + cls);
        const els = (cls) => document.querySelectorAll(sc + ' ' + cls);

        const tl = gsap.timeline({ paused: true });

        gsap.set(el('.eyebrow'), { opacity: 0 });
        gsap.set(el('.headline'), { x: -60, opacity: 0 });
        gsap.set(el('.gold-rule'), { width: 0 });
        gsap.set(els('.bullet'), { y: 18, opacity: 0 });
        gsap.set(el('.bottom-note'), { opacity: 0 });
        gsap.set(el('.fade'), { opacity: 0 });

        tl
          .to(el('.eyebrow'), { opacity: 1, duration: 0.15, ease: 'power2.out' }, 0)
          .to(el('.headline'), { x: 0, opacity: 1, duration: 0.6, ease: 'power3.out' }, 0.3)
          .to(el('.gold-rule'), { width: 520, duration: 0.55, ease: 'power3.out' }, 0.7)
          .to(els('.bullet'), { y: 0, opacity: 1, duration: 0.5, ease: 'power2.out', stagger: 0.18 }, 0.85)
          .to(el('.bottom-note'), { opacity: 1, duration: 0.5, ease: 'power2.out' }, 1.7)
          .to(el('.fade'), { opacity: 1, duration: 0.4, ease: 'power2.inOut' }, 4.1);

        window.__timelines = window.__timelines || {};
        window.__timelines['scene15-cancer'] = tl;
