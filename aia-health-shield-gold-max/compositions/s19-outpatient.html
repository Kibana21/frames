<template id="scene19-outpatient-template">
  <div
    data-composition-id="scene19-outpatient"
    data-width="1920"
    data-height="1080"
    data-duration="4"
  >
    <style>
      [data-composition-id="scene19-outpatient"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        font-family: 'Inter', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      [data-composition-id="scene19-outpatient"] .inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        width: 100%;
      }

      [data-composition-id="scene19-outpatient"] .eyebrow {
        font-size: 20px;
        font-weight: 600;
        color: #DA2032;
        text-transform: uppercase;
        letter-spacing: 0.28em;
        margin-bottom: 28px;
        opacity: 0;
      }

      [data-composition-id="scene19-outpatient"] .headline {
        font-size: 72px;
        font-weight: 800;
        color: #ffffff;
        text-align: center;
        line-height: 1.1;
        margin-bottom: 40px;
        opacity: 0;
      }

      [data-composition-id="scene19-outpatient"] .gold-rule {
        height: 5px;
        width: 0;
        background: linear-gradient(90deg, #C9A84C, #E8D5A3);
        border-radius: 2px;
        margin-bottom: 56px;
      }

      [data-composition-id="scene19-outpatient"] .boxes {
        display: flex;
        gap: 48px;
        justify-content: center;
      }

      [data-composition-id="scene19-outpatient"] .box {
        width: 600px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        opacity: 0;
      }

      [data-composition-id="scene19-outpatient"] .box-icon {
        width: 48px;
        height: 48px;
        margin-bottom: 8px;
      }

      [data-composition-id="scene19-outpatient"] .box-title {
        font-size: 28px;
        font-weight: 600;
        color: #ffffff;
      }

      [data-composition-id="scene19-outpatient"] .box-amount {
        font-size: 22px;
        font-weight: 600;
        color: #C9A84C;
      }

      [data-composition-id="scene19-outpatient"] .box-note {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.5);
      }

      [data-composition-id="scene19-outpatient"] .fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <div class="inner">
      <div class="eyebrow">New from October 2025</div>
      <div class="headline">Outpatient &amp; Home-Based Treatments</div>
      <div class="gold-rule"></div>
      <div class="boxes">
        <div class="box" data-box="1">
          <svg class="box-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="20" y="4" width="8" height="40" rx="4" fill="#DA2032"/>
            <rect x="4" y="20" width="40" height="8" rx="4" fill="#DA2032"/>
          </svg>
          <div class="box-title">Outpatient Treatments</div>
          <div class="box-amount">Up to 2× MSHL limits</div>
          <div class="box-note">Covered at AIA Preferred Providers</div>
        </div>
        <div class="box" data-box="2">
          <svg class="box-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 4L4 20v24h16V32h8v12h16V20L24 4z" stroke="#DA2032" stroke-width="3" stroke-linejoin="round" fill="none"/>
          </svg>
          <div class="box-title">Home-Based Care</div>
          <div class="box-amount">Up to S$10,000/month</div>
          <div class="box-note">For palliative care at home</div>
        </div>
      </div>
    </div>

    <div class="fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene19-outpatient"]';
        const el = (cls) => document.querySelector(sc + ' ' + cls);
        const els = (cls) => document.querySelectorAll(sc + ' ' + cls);

        const tl = gsap.timeline({ paused: true });

        const boxes = els('.box');

        gsap.set(el('.eyebrow'), { opacity: 0 });
        gsap.set(el('.headline'), { y: 30, opacity: 0 });
        gsap.set(el('.gold-rule'), { width: 0 });
        gsap.set(boxes[0], { x: -40, opacity: 0 });
        gsap.set(boxes[1], { x: 40, opacity: 0 });
        gsap.set(el('.fade'), { opacity: 0 });

        tl
          .to(el('.eyebrow'), { opacity: 1, duration: 0.3, ease: 'power2.out' }, 0.2)
          .to(el('.headline'), { y: 0, opacity: 1, duration: 0.6, ease: 'power3.out' }, 0.35)
          .to(el('.gold-rule'), { width: 640, duration: 0.55, ease: 'power3.out' }, 0.75)
          .to(boxes[0], { x: 0, opacity: 1, duration: 0.6, ease: 'power3.out' }, 0.9)
          .to(boxes[1], { x: 0, opacity: 1, duration: 0.6, ease: 'power3.out' }, 1.0)
          .to(el('.fade'), { opacity: 1, duration: 0.4, ease: 'power2.inOut' }, 3.6);

        window.__timelines = window.__timelines || {};
        window.__timelines['scene19-outpatient'] = tl;
      })();
    </script>
  </div>
</template>
