<template id="scene03-costs-template">
  <div
    data-composition-id="scene03-costs"
    data-width="1920"
    data-height="1080"
    data-duration="3.5"
  >
    <style>
      [data-composition-id="scene03-costs"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        display: flex;
        align-items: center;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      [data-composition-id="scene03-costs"] .left-stripe {
        position: absolute;
        left: 0;
        top: 0;
        width: 8px;
        height: 100%;
        background: #DA2032;
      }
      [data-composition-id="scene03-costs"] .content {
        padding-left: 160px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      [data-composition-id="scene03-costs"] .label {
        font-size: 22px;
        color: #DA2032;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        font-weight: 600;
        opacity: 0;
        margin-bottom: 16px;
      }
      [data-composition-id="scene03-costs"] .big-stat {
        font-size: 160px;
        font-weight: 900;
        color: #ffffff;
        letter-spacing: -0.04em;
        line-height: 1;
        opacity: 0;
      }
      [data-composition-id="scene03-costs"] .desc {
        font-size: 32px;
        color: rgba(255, 255, 255, 0.55);
        margin-top: 20px;
        opacity: 0;
        max-width: 900px;
      }
      [data-composition-id="scene03-costs"] .small-text {
        font-size: 22px;
        color: rgba(255, 255, 255, 0.35);
        margin-top: 16px;
        opacity: 0;
        max-width: 800px;
      }
      [data-composition-id="scene03-costs"] .fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <div class="left-stripe"></div>
    <div class="content">
      <div class="label">Medical costs in Singapore</div>
      <div class="big-stat">S$100,000+</div>
      <div class="desc">Average hospitalisation bill can exceed six figures.</div>
      <div class="small-text">Without adequate coverage, savings can be wiped out.</div>
    </div>
    <div class="fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene03-costs"]';
        const tl = gsap.timeline({ paused: true });

        gsap.set(`${sc} .label`, { opacity: 0 });
        gsap.set(`${sc} .big-stat`, { y: 50, opacity: 0 });
        gsap.set(`${sc} .desc`, { opacity: 0 });
        gsap.set(`${sc} .small-text`, { opacity: 0 });
        gsap.set(`${sc} .fade`, { opacity: 0 });

        tl.to(`${sc} .label`, { opacity: 1, duration: 0.4, ease: 'power2.out' }, 0)
          .to(`${sc} .big-stat`, { y: 0, opacity: 1, duration: 0.6, ease: 'expo.out' }, 0.4)
          .to(`${sc} .desc`, { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.85)
          .to(`${sc} .small-text`, { opacity: 1, duration: 0.5, ease: 'power2.out' }, 1.1)
          .to(`${sc} .fade`, { opacity: 1, duration: 0.4 }, 3.1);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene03-costs"] = tl;
      })();
    </script>
  </div>
</template>
