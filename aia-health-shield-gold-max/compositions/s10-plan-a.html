<template id="scene10-plan-a-template">
  <div
    data-composition-id="scene10-plan-a"
    data-width="1920"
    data-height="1080"
    data-duration="4"
  >
    <style>
      [data-composition-id="scene10-plan-a"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding-left: 160px;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      [data-composition-id="scene10-plan-a"] .plan-pill {
        display: inline-block;
        background: #DA2032;
        color: #ffffff;
        font-size: 18px;
        font-weight: 600;
        padding: 8px 24px;
        border-radius: 40px;
        opacity: 0;
        margin-bottom: 28px;
      }
      [data-composition-id="scene10-plan-a"] .headline {
        font-size: 96px;
        font-weight: 900;
        color: #ffffff;
        line-height: 1.1;
        letter-spacing: -0.03em;
        opacity: 0;
        max-width: 1200px;
      }
      [data-composition-id="scene10-plan-a"] .gold-rule {
        width: 0px;
        height: 5px;
        background: #C9A84C;
        margin: 36px 0;
        border-radius: 3px;
      }
      [data-composition-id="scene10-plan-a"] .bullets {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      [data-composition-id="scene10-plan-a"] .bullet {
        display: flex;
        align-items: center;
        gap: 16px;
        opacity: 0;
      }
      [data-composition-id="scene10-plan-a"] .bullet-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #DA2032;
        flex-shrink: 0;
      }
      [data-composition-id="scene10-plan-a"] .bullet-text {
        font-size: 28px;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 500;
      }
      [data-composition-id="scene10-plan-a"] .sub-text {
        font-size: 22px;
        color: rgba(255, 255, 255, 0.45);
        margin-top: 32px;
        opacity: 0;
      }
      [data-composition-id="scene10-plan-a"] .fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <div class="plan-pill">Plan A</div>
    <div class="headline">Private Hospital.<br>Your choice.</div>
    <div class="gold-rule"></div>
    <div class="bullets">
      <div class="bullet bullet1">
        <div class="bullet-dot"></div>
        <div class="bullet-text">Up to S$2,000,000 per policy year</div>
      </div>
      <div class="bullet bullet2">
        <div class="bullet-dot"></div>
        <div class="bullet-text">Unlimited lifetime claim amount</div>
      </div>
      <div class="bullet bullet3">
        <div class="bullet-dot"></div>
        <div class="bullet-text">Any licensed private hospital in Singapore</div>
      </div>
    </div>
    <div class="sub-text">With AIA Max VitalHealth Pro rider</div>
    <div class="fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene10-plan-a"]';
        const tl = gsap.timeline({ paused: true });

        gsap.set(`${sc} .plan-pill`, { opacity: 0 });
        gsap.set(`${sc} .headline`, { x: -60, opacity: 0 });
        gsap.set(`${sc} .gold-rule`, { width: 0 });
        gsap.set(`${sc} .bullet`, { y: 20, opacity: 0 });
        gsap.set(`${sc} .sub-text`, { opacity: 0 });
        gsap.set(`${sc} .fade`, { opacity: 0 });

        tl.to(`${sc} .plan-pill`, { opacity: 1, duration: 0.4, ease: 'power2.out' }, 0.2)
          .to(`${sc} .headline`, { x: 0, opacity: 1, duration: 0.6, ease: 'power3.out' }, 0.3)
          .to(`${sc} .gold-rule`, { width: 700, duration: 0.5, ease: 'power2.out' }, 0.75)
          .to(`${sc} .bullet1`, { y: 0, opacity: 1, duration: 0.45, ease: 'power2.out' }, 0.9)
          .to(`${sc} .bullet2`, { y: 0, opacity: 1, duration: 0.45, ease: 'power2.out' }, 1.1)
          .to(`${sc} .bullet3`, { y: 0, opacity: 1, duration: 0.45, ease: 'power2.out' }, 1.3)
          .to(`${sc} .sub-text`, { opacity: 1, duration: 0.4, ease: 'power2.out' }, 1.6)
          .to(`${sc} .fade`, { opacity: 1, duration: 0.4 }, 3.6);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene10-plan-a"] = tl;
      })();
    </script>
  </div>
</template>
