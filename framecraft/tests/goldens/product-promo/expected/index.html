<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>30-second promo for an AI health insurance app called Shield</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=block" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #09090C; font-family: "Inter", sans-serif; }
      .scene { position: absolute; inset: 0; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main"
         data-start="0" data-duration="20.000"
         data-width="1920" data-height="1080">
      <div id="scene-00-title-card" class="scene"
           data-composition-id="scene-00-title-card"
           data-composition-src="compositions/scene-00-title-card.html"
           data-start="0.000" data-duration="8.000" data-track-index="1"
           data-width="1920" data-height="1080"></div>
      <div id="scene-01-end-card" class="scene"
           data-composition-id="scene-01-end-card"
           data-composition-src="compositions/scene-01-end-card.html"
           data-start="8.000" data-duration="12.000" data-track-index="1"
           data-width="1920" data-height="1080"></div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
