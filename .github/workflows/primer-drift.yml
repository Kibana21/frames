name: Primer Drift Check

on:
  schedule:
    - cron: "0 9 * * 1"   # weekly, Monday 09:00 UTC
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: framecraft

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check primer drift
        id: check
        run: python scripts/snapshot_primer.py --check > drift-output.txt 2>&1
        continue-on-error: true

      - name: Open issue on drift
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('framecraft/drift-output.txt', 'utf8');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Primer drift detected',
              body: `Weekly primer drift check found changes.\n\n\`\`\`\n${body.slice(0, 8000)}\n\`\`\`\n\nRun \`python scripts/snapshot_primer.py --update\` to refresh.`,
              labels: ['primer-drift'],
            });
