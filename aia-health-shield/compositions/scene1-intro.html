<template id="scene1-intro-template">
  <div
    data-composition-id="scene1-intro"
    data-width="1920"
    data-height="1080"
    data-duration="3.5"
  >
    <div class="s1-canvas">
      <div class="s1-letters">
        <span class="s1-letter" id="s1-a1">A</span>
        <span class="s1-letter" id="s1-i">I</span>
        <span class="s1-letter" id="s1-a2">A</span>
      </div>
      <div class="s1-underline"></div>
      <div class="s1-tagline">Healthier, Longer, Better Lives.</div>
    </div>

    <style>
      [data-composition-id="scene1-intro"] .s1-canvas {
        width: 1920px;
        height: 1080px;
        background: #0A0A0A;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      [data-composition-id="scene1-intro"] .s1-letters {
        display: flex;
        gap: 24px;
        align-items: baseline;
      }
      [data-composition-id="scene1-intro"] .s1-letter {
        font-size: 240px;
        font-weight: 900;
        color: #ffffff;
        line-height: 1;
        letter-spacing: -0.02em;
        display: inline-block;
        opacity: 0;
      }
      [data-composition-id="scene1-intro"] .s1-underline {
        width: 0px;
        height: 8px;
        background: #DA2032;
        margin-top: 16px;
        border-radius: 4px;
      }
      [data-composition-id="scene1-intro"] .s1-tagline {
        font-size: 30px;
        font-weight: 400;
        color: #DA2032;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        margin-top: 36px;
        opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const scope = '[data-composition-id="scene1-intro"]';
        const tl = gsap.timeline({ paused: true });

        gsap.set(`${scope} #s1-a1`, { y: -160 });
        gsap.set(`${scope} #s1-i`,  { y: -160 });
        gsap.set(`${scope} #s1-a2`, { y: -160 });

        tl.to(`${scope} #s1-a1`, { opacity: 1, y: 0, duration: 0.55, ease: "expo.out" }, 0.1);
        tl.to(`${scope} #s1-i`,  { opacity: 1, y: 0, duration: 0.55, ease: "expo.out" }, 0.22);
        tl.to(`${scope} #s1-a2`, { opacity: 1, y: 0, duration: 0.55, ease: "expo.out" }, 0.34);

        tl.to(`${scope} .s1-underline`, { width: 530, duration: 0.55, ease: "power3.out" }, 0.7);
        tl.to(`${scope} .s1-tagline`, { opacity: 1, duration: 0.6, ease: "power2.out" }, 1.05);

        tl.to(`${scope} .s1-canvas`, { opacity: 0, duration: 0.4, ease: "power2.in" }, 3.1);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene1-intro"] = tl;
      })();
    </script>
  </div>
</template>
