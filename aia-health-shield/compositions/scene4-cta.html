<template id="scene4-cta-template">
  <div
    data-composition-id="scene4-cta"
    data-width="1920"
    data-height="1080"
    data-duration="4.5"
  >
    <div class="s4-canvas">
      <div class="s4-red-bg"></div>

      <div class="s4-content">
        <div class="s4-line1">Protect what</div>
        <div class="s4-line2">matters most.</div>
        <div class="s4-rule"></div>
        <div class="s4-product">Health Shield Gold Max</div>
        <div class="s4-cta">Talk to your AIA advisor today</div>
      </div>

      <div class="s4-aia">AIA</div>
    </div>

    <style>
      [data-composition-id="scene4-cta"] .s4-canvas {
        width: 1920px;
        height: 1080px;
        background: #0A0A0A;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        padding-left: 160px;
      }
      [data-composition-id="scene4-cta"] .s4-red-bg {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #DA2032;
        transform-origin: left;
        z-index: 0;
      }
      [data-composition-id="scene4-cta"] .s4-content {
        position: relative;
        z-index: 2;
      }
      [data-composition-id="scene4-cta"] .s4-line1,
      [data-composition-id="scene4-cta"] .s4-line2 {
        font-size: 148px;
        font-weight: 900;
        color: #ffffff;
        line-height: 1.0;
        letter-spacing: -0.04em;
        opacity: 0;
      }
      [data-composition-id="scene4-cta"] .s4-rule {
        width: 0;
        height: 4px;
        background: rgba(255, 255, 255, 0.35);
        margin: 28px 0 24px;
        border-radius: 2px;
      }
      [data-composition-id="scene4-cta"] .s4-product {
        font-size: 40px;
        font-weight: 700;
        color: #C9A84C;
        letter-spacing: 0.06em;
        opacity: 0;
      }
      [data-composition-id="scene4-cta"] .s4-cta {
        font-size: 24px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.75);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-top: 18px;
        opacity: 0;
      }
      [data-composition-id="scene4-cta"] .s4-aia {
        position: absolute;
        bottom: 56px;
        right: 120px;
        font-size: 88px;
        font-weight: 900;
        color: rgba(255, 255, 255, 0.12);
        letter-spacing: -0.02em;
        z-index: 2;
        opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const scope = '[data-composition-id="scene4-cta"]';
        const tl = gsap.timeline({ paused: true });

        gsap.set(`${scope} .s4-red-bg`, { scaleX: 0 });
        gsap.set(`${scope} .s4-line1`, { y: 50 });
        gsap.set(`${scope} .s4-line2`, { y: 50 });

        tl.to(`${scope} .s4-red-bg`, { scaleX: 1, duration: 0.65, ease: "expo.out" }, 0.0);

        tl.to(`${scope} .s4-line1`, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 0.5);
        tl.to(`${scope} .s4-line2`, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 0.72);

        tl.to(`${scope} .s4-rule`, { width: 740, duration: 0.5, ease: "power3.out" }, 1.1);
        tl.to(`${scope} .s4-product`, { opacity: 1, duration: 0.5 }, 1.3);
        tl.to(`${scope} .s4-cta`, { opacity: 1, duration: 0.5 }, 1.6);
        tl.to(`${scope} .s4-aia`, { opacity: 1, duration: 0.7 }, 1.8);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene4-cta"] = tl;
      })();
    </script>
  </div>
</template>
