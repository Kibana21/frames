<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>AIA Health Shield Gold Max</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=block"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0A0A0A;
        font-family: "Inter", sans-serif;
      }
      .scene {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="20"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="scene-1"
        class="scene"
        data-composition-id="scene1-intro"
        data-composition-src="compositions/scene1-intro.html"
        data-start="0"
        data-duration="3.5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-2"
        class="scene"
        data-composition-id="scene2-product"
        data-composition-src="compositions/scene2-product.html"
        data-start="3.5"
        data-duration="6"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-3"
        class="scene"
        data-composition-id="scene3-features"
        data-composition-src="compositions/scene3-features.html"
        data-start="9.5"
        data-duration="6"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="scene-4"
        class="scene"
        data-composition-id="scene4-cta"
        data-composition-src="compositions/scene4-cta.html"
        data-start="15.5"
        data-duration="4.5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
