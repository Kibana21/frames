        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
        <script>
            (function () {
                const DURATION = 5.000;
                const scope = '[data-composition-id="scene-03-lower-third"]';
                const tl = gsap.timeline({ paused: true });

                // --- Camera & Atmosphere ---
                const atmosphereTl = gsap.timeline();
                const cycle = DURATION;
                const loops = Math.floor(DURATION / cycle);

                gsap.set(scope, { autoAlpha: 1 });
                tl.to(scope + ' .root-camera', { scale: 1.05, duration: DURATION, ease: 'sine.inOut' }, 0);

                atmosphereTl
                    .to(scope + ' .grain-overlay', { opacity: 0.1, duration: cycle / 2, ease: 'sine.inOut', yoyo: true, repeat: loops > 0 ? loops * 2 - 1 : 0 }, 0)
                    .to(scope + ' .orb-a', { x: '+=80', y: '-=40', scale: 1.1, duration: cycle, ease: 'sine.inOut' }, 0)
                    .to(scope + ' .orb-b', { x: '-=60', y: '+=50', scale: 0.9, duration: cycle, ease: 'sine.inOut' }, 0)
                    .to(scope + ' .vignette', { opacity: 0.25, duration: cycle / 2, ease: 'sine.inOut', yoyo: true, repeat: loops > 0 ? loops * 2 - 1 : 0 }, 0);

                // --- Entry Animation ---
                const entryTl = gsap.timeline();
                const statCards = gsap.utils.toArray(scope + ' .stat-card');
                const headlineChars = gsap.utils.toArray(scope + ' .headline .char');

                entryTl
                    .from(scope + ' .eyebrow-label', { autoAlpha: 0, y: -20, ease: 'power3.out', duration: 0.6 }, 0)
                    .from(scope + ' .headline-accent-bar', { scaleX: 0, ease: 'power3.out', duration: 0.8 }, 0.1)
                    .from(headlineChars, { yPercent: 100, stagger: 0.03, ease: 'power3.out', duration: 0.8 }, 0.1)
                    // SIGNATURE MOMENT: Stat-card cascade
                    .from(statCards, {
                        z: -600,
                        y: 250,
                        autoAlpha: 0,
                        stagger: 0.12,
                        ease: 'back.out(1.6)',
                        duration: 1.2,
                        onStart: function() {
                            // Add chromatic aberration effect on impact
                            gsap.fromTo(this.targets(), 
                                { filter: 'blur(2px)', x: '+=5', y: '+=5', textShadow: '3px 3px 0px rgba(255,0,0,0.5), -3px -3px 0px rgba(0,255,255,0.5)' },
                                { filter: 'blur(0px)', x: '-=5', y: '-=5', textShadow: '0px 0px 0px rgba(255,0,0,0), 0px 0px 0px rgba(0,255,255,0)', duration: 0.4, ease: 'power2.out', delay: 0.8 }
                            );
                        }
                    }, 0);

                // Number counters and label reveals
                const countersTl = gsap.timeline();
                const val100 = { val: 0 };
                countersTl.to(val100, { val: 100, roundProps: "val", duration: 0.8, ease: 'power3.out', onUpdate: () => { document.querySelector(scope + ' [data-track-index="24"]').textContent = val100.val + '%'; } }, 0);
                const val13 = { val: 0 };
                countersTl.to(val13, { val: 13, roundProps: "val", duration: 0.8, ease: 'power3.out', onUpdate: () => { document.querySelector(scope + ' [data-track-index="28"]').textContent = val13.val; } }, 0.1);
                
                // Original tweens for non-counting numbers are replaced by the new variable-weight swell below
                countersTl
                    .from(gsap.utils.toArray(scope + ' .stat-label'), { autoAlpha: 0, y: 15, stagger: 0.1, ease: 'power3.out', duration: 0.6 }, 0.2)
                    .from(scope + ' .stat-chip', { scale: 0, autoAlpha: 0, ease: 'back.out(1.8)', duration: 0.5 }, 0.6);

                entryTl.add(countersTl, 1.0);
                
                // --- NEW: Stat Card Polish ---
                const cardPolishTl = gsap.timeline();
                cardPolishTl
                    .from(scope + ' .card-accent-top', { scaleX: 0, duration: 0.7, ease: 'power3.out', stagger: 0.12 }, 0)
                    .fromTo(scope + ' .stat-value-swell', 
                        { fontVariationSettings: "'wght' 300", autoAlpha: 0 }, 
                        { fontVariationSettings: "'wght' 800", autoAlpha: 1, duration: 0.9, ease: 'power3.out', stagger: 0.2 }, 0);

                const lightSweepCycle = 3.5;
                const lightSweepLoops = Math.floor((DURATION - 1.8) / lightSweepCycle);
                const lightSweepTl = gsap.timeline({ repeat: lightSweepLoops > 0 ? lightSweepLoops - 1 : 0 });
                lightSweepTl.fromTo(scope + ' .light-sweep',
                    { x: '-150%' },
                    { x: '150%', duration: lightSweepCycle, ease: 'none', stagger: { amount: 1.2, from: 'start' } }
                );

                // --- Shield Motif ---
                const motifTl = gsap.timeline();
                const shieldPath = document.querySelector(scope + ' .shield-motif path');
                const pathLength = shieldPath.getTotalLength();
                const pulseRings = gsap.utils.toArray(scope + ' .shield-pulse-ring');

                motifTl
                    .set(shieldPath, { strokeDasharray: pathLength, strokeDashoffset: pathLength })
                    .to(shieldPath, { strokeDashoffset: 0, ease: 'power3.out', duration: 1.0 })
                    .fromTo(pulseRings,
                        { scale: 1, autoAlpha: 0.7 },
                        {
                            scale: 2.5,
                            autoAlpha: 0,
                            stagger: 0.5,
                            duration: 1.5,
                            ease: 'power2.out',
                            repeat: 1,
                        },
                        '-=0.2');

                // --- Exit Animation ---
                const exitTl = gsap.timeline();
                const particles = gsap.utils.toArray(scope + ' .particle');
                const contentToHide = [
                    scope + ' .headline-group',
                    scope + ' .shield-container',
                    scope + ' .stat-grid'
                ];

                exitTl
                    .to(contentToHide, { autoAlpha: 0, duration: 0.3, ease: 'power2.in' }, 0)
                    .set(scope + ' .particle-container', { autoAlpha: 1 }, 0.1)
                    .from(particles, {
                        x: () => gsap.utils.random(-800, 800),
                        y: () => gsap.utils.random(-500, 500),
                        scale: () => gsap.utils.random(0.5, 2),
                        autoAlpha: 0,
                        duration: 0.8,
                        stagger: {
                            amount: 0.3,
                            from: 'random'
                        },
                        ease: 'power3.in'
                    }, 0.1);

                // --- Main Timeline Assembly ---
                tl.add(atmosphereTl, 0)
                  .add(entryTl, 0.2)
                  .add(cardPolishTl, 1.4) // Add polish after cards start landing
                  .add(lightSweepTl, 1.8) // Add continuous sweep during hold
                  .add(motifTl, 1.8)
                  .add(exitTl, 4.2);

                window.__timelines = window.__timelines || {};
                window.__timelines["scene-03-lower-third"] = tl;
            })();
        </script>
