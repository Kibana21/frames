    <script>
        (function () {
            window.__timelines = window.__timelines || {};
            gsap.registerPlugin(MorphSVGPlugin);

            const root = '[data-composition-id="scene-06-end-card"]';
            const duration = 5.000;
            const tl = gsap.timeline({ paused: true });

            // --- ADDED: Particle Grid Generation ---
            const particleGrid = document.querySelector(root + ' .particle-grid');
            let particleHTML = '';
            for (let i = 0; i < 12 * 8; i++) {
                particleHTML += '<div class="particle-dot"></div>';
            }
            particleGrid.innerHTML = particleHTML;

            // --- Data for Morph ---
            const aiaPaths = {
                p1: "M56.3,112.5L25,10.8h25.7l16.4,59.8h0.4l16.4-59.8h25.7L98.3,112.5H74.8l-5.4-22.3H61.1L56.3,112.5z M63.6,79.1h23.3L75.2,34L63.6,79.1z",
                p2: "M138.8,112.5V10.8h22.9v101.7H138.8z",
                p3: "M218.5,112.5L187.2,10.8h25.7l16.4,59.8h0.4l16.4-59.8h25.7l-31.4,101.7h-23.5l-5.4-22.3h-22.5L218.5,112.5z M225.8,79.1h23.3L237.4,34L225.8,79.1z",
                p4: "M150,65 L150,65",
                p5: "M150,65 L150,65"
            };

            // --- Sub-timelines ---
            const entryTl = gsap.timeline();
            entryTl
                .to(root + ' .logo-wordmark-container:not(.logo-wordmark-outline) .logo-path[data-morph-id="1"]', { duration: 1.2, morphSVG: aiaPaths.p1, ease: "power3.inOut" }, 0)
                .to(root + ' .logo-wordmark-container:not(.logo-wordmark-outline) .logo-path[data-morph-id="2"]', { duration: 1.2, morphSVG: aiaPaths.p2, ease: "power3.inOut" }, 0)
                .to(root + ' .logo-wordmark-container:not(.logo-wordmark-outline) .logo-path[data-morph-id="3"]', { duration: 1.2, morphSVG: aiaPaths.p3, ease: "power3.inOut" }, 0)
                .to(root + ' .logo-wordmark-container:not(.logo-wordmark-outline) .logo-path[data-morph-id="4"]', { duration: 1.2, morphSVG: aiaPaths.p4, ease: "power3.inOut" }, 0)
                .to(root + ' .logo-wordmark-container:not(.logo-wordmark-outline) .logo-path[data-morph-id="5"]', { duration: 1.2, morphSVG: aiaPaths.p5, ease: "power3.inOut" }, 0)
                .to(root + ' .logo-wordmark-container:not(.logo-wordmark-outline)', {
                    duration: 1.0,
                    top: "120px",
                    left: "100px",
                    transform: "translate(0, 0)",
                    ease: "power3.out"
                }, 1.0)
                // ADDED: Animate outline logo in sync
                .to(root + ' .logo-wordmark-outline .logo-path[data-morph-id="1"]', { duration: 1.2, morphSVG: aiaPaths.p1, ease: "power3.inOut" }, 0)
                .to(root + ' .logo-wordmark-outline .logo-path[data-morph-id="2"]', { duration: 1.2, morphSVG: aiaPaths.p2, ease: "power3.inOut" }, 0)
                .to(root + ' .logo-wordmark-outline .logo-path[data-morph-id="3"]', { duration: 1.2, morphSVG: aiaPaths.p3, ease: "power3.inOut" }, 0)
                .to(root + ' .logo-wordmark-outline .logo-path[data-morph-id="4"]', { duration: 1.2, morphSVG: aiaPaths.p4, ease: "power3.inOut" }, 0)
                .to(root + ' .logo-wordmark-outline .logo-path[data-morph-id="5"]', { duration: 1.2, morphSVG: aiaPaths.p5, ease: "power3.inOut" }, 0)
                .fromTo(root + ' .logo-wordmark-outline', { opacity: 0, top: "50%", left: "50%", transform: "translate(-50%, -50%)" }, {
                    duration: 1.0,
                    opacity: 0.4,
                    top: "128px", // slight offset for parallax
                    left: "108px",
                    transform: "translate(0, 0)",
                    ease: "power3.out"
                }, 1.0);

            const copyTl = gsap.timeline();
            copyTl
                .from(root + ' .brand-tagline .char', {
                    yPercent: 110,
                    stagger: 0.04,
                    duration: 0.8,
                    ease: "back.out(1.6)"
                }, 0)
                .from(root + ' .brand-cta .word', {
                    y: 20,
                    opacity: 0,
                    filter: 'blur(8px)',
                    stagger: 0.12,
                    duration: 0.7,
                    ease: 'power3.out'
                }, 0.3)
                .from(root + ' .disclaimer-text', { opacity: 0, y: 10, duration: 0.6, ease: 'power2.out' }, 0.7)
                .to(root + ' .cta-accent-bar', { width: '330px', ease: 'power3.out', duration: 0.8 }, 0.5)
                .fromTo(root + ' .divider-rule', { scaleX: 0 }, { scaleX: 1, duration: 0.8, ease: 'power3.out' }, 0.5)
                .to(root + ' .divider-rule::before', { x: '200%', duration: 1.0, ease: 'power2.inOut' }, 0.6) // ADDED: Divider light sweep
                .from(root + ' .icon-heart-cross', { scale: 0, opacity: 0, rotate: -45, duration: 0.8, ease: 'back.out(1.7)' }, 1.0)
                // ADDED: Tracking pulse on tagline for hold
                .to(root + ' .brand-tagline', { letterSpacing: '0.07em', duration: 2.0, ease: 'sine.inOut', repeat: 1, yoyo: true }, 1.0);

            const atmosphereTl = gsap.timeline();
            const cycle = 4.5;
            const loops = Math.floor(duration / cycle);
            atmosphereTl
                .to(root + ' .orb-a', { x: '+=80', y: '-=50', scale: 1.1, duration: cycle, ease: 'sine.inOut' }, 0)
                .to(root + ' .orb-b', { x: '-=60', y: '+=40', scale: 0.9, duration: cycle, ease: 'sine.inOut' }, 0)
                .to(root + ' .atmosphere-vignette', { opacity: 0.2, duration: cycle / 2, ease: 'sine.inOut' }, 0)
                .to(root + ' .atmosphere-vignette', { opacity: 0.15, duration: cycle / 2, ease: 'sine.inOut' }, cycle / 2)
                .fromTo(root + ' .atmosphere-light-ray', { y: '-50%' }, { y: '150%', duration: duration, ease: 'linear' }, 0)
                .fromTo(root + ' .light-ray-2', { y: '150%' }, { y: '-50%', duration: duration, ease: 'linear' }, 0)
                .to(root + ' .atmosphere-grain', { rotation: 360, duration: duration * 2, ease: 'linear' }, 0);
            if (loops > 0) {
                atmosphereTl.repeat(loops - 1).yoyo(true);
            }
            
            // ADDED: Particle grid animation
            const particlesTl = gsap.timeline();
            particlesTl
                .from(gsap.utils.toArray(root + ' .particle-dot'), {
                    scale: 0,
                    opacity: 0,
                    duration: 1.2,
                    ease: 'power3.out',
                    stagger: {
                        grid: [8, 12],
                        from: 'center',
                        amount: 0.6
                    }
                }, 0)
                .to(root + ' .particle-grid', {
                    opacity: 0.2,
                    duration: 2.5,
                    ease: 'sine.inOut',
                    repeat: 1,
                    yoyo: true
                }, 1.0);

            // --- Main Timeline ---
            tl
                .to(root, { scale: 1.05, duration: duration, ease: 'sine.inOut' }, 0)
                .to(root + ' .perspective-wrapper', { rotateY: -2, duration: duration / 2, ease: 'sine.inOut' }, 0)
                .to(root + ' .perspective-wrapper', { rotateY: 2, duration: duration / 2, ease: 'sine.inOut' }, duration / 2)
                .add(atmosphereTl, 0)
                .add(particlesTl, 0.8) // Add particle animation
                .add(entryTl, 0)
                .add(copyTl, 1.5)
                .to(root + ' .content-element', {
                    opacity: 0,
                    y: -20,
                    duration: 0.6,
                    stagger: 0.05,
                    ease: 'power2.in'
                }, duration - 0.6);

            window.__timelines["scene-06-end-card"] = tl;
        })();
    </script>
