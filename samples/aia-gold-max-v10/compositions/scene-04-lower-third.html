    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
        (function() {
            window.__timelines = window.__timelines || {};
            const compId = "scene-04-lower-third";
            const scope = '[data-composition-id="' + compId + '"]';
            const duration = parseFloat(document.querySelector(scope).getAttribute('data-duration'));

            const tl = gsap.timeline({
                paused: true
            });

            // --- Particle Generation ---
            const particleContainer = document.querySelector(scope + ' .particle-grid');
            const numParticles = 100;
            for (let i = 0; i < numParticles; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particleContainer.appendChild(particle);
            }
            const particles = gsap.utils.toArray(scope + ' .particle');

            // --- Sub-timeline: Atmosphere ---
            const atmosphereTl = gsap.timeline();
            const cycle = 4;
            const loops = Math.max(0, Math.floor(duration / cycle));
            atmosphereTl
                .to(scope + ' .orb-a', { x: '+=40', y: '-=20', duration: cycle, ease: 'sine.inOut' }, 0)
                .to(scope + ' .orb-b', { x: '-=30', y: '+=15', duration: cycle, ease: 'sine.inOut' }, 0)
                .to(scope + ' .vignette-overlay', { opacity: 0.2, duration: cycle / 2, ease: 'sine.inOut' }, 0)
                .to(scope + ' .vignette-overlay', { opacity: 0.15, duration: cycle / 2, ease: 'sine.inOut' }, cycle / 2)
                .to(scope + ' .svg-grain', { attr: { baseFrequency: '0.6' }, duration: cycle, ease: 'sine.inOut' }, 0);
            
            const atmosphereLoopTl = gsap.timeline({ repeat: loops, yoyo: true });
            atmosphereLoopTl.add(atmosphereTl);

            // --- Sub-timeline: Exhibit Entry (Signature Moment) ---
            const entryExhibitTl = gsap.timeline();
            
            entryExhibitTl.from(particles, {
                x: () => gsap.utils.random(-800, 800),
                y: () => gsap.utils.random(-500, 500),
                scale: () => gsap.utils.random(0.2, 1.5),
                opacity: 0,
                duration: 0.7,
                ease: 'power2.in',
                stagger: { amount: 0.1, from: 'center' }
            }, 0);
            entryExhibitTl.to(particles, { opacity: 0, duration: 0.1 }, 0.7);

            entryExhibitTl.from(scope + ' .shield-icon-container', { scale: 0, opacity: 0, ease: 'back.out(2)' }, 0.7);
            entryExhibitTl.from(scope + ' .timeline-line', { scaleX: 0, duration: 0.8, ease: 'power3.out' }, 0.75);
            entryExhibitTl.from(gsap.utils.toArray([scope + ' .milestone-pre .milestone-dot', scope + ' .milestone-post .milestone-dot']), {
                scale: 0,
                duration: 0.6,
                ease: 'back.out(1.8)',
                stagger: 0.1
            }, 1.0);

            const labels = gsap.utils.toArray([
                scope + ' .label-pre-event', scope + ' .label-pre-time',
                scope + ' .label-hosp-event',
                scope + ' .label-post-event', scope + ' .label-post-time'
            ]);
            entryExhibitTl.from(labels, {
                opacity: 0,
                y: 15,
                duration: 0.5,
                ease: 'power3.out',
                stagger: 0.1
            }, 1.2);

            const clockPath = document.querySelector(scope + ' .shield-clock-path circle');
            const pathLength = clockPath.getTotalLength();
            entryExhibitTl.fromTo(clockPath, {
                strokeDasharray: pathLength,
                strokeDashoffset: pathLength
            }, {
                strokeDashoffset: 0,
                duration: 0.8,
                ease: 'power2.out'
            }, 1.2);

            // --- Sub-timeline: Hold State / Continuous Pulse (ELEVATION) ---
            const holdStateTl = gsap.timeline();
            const pulseCycle = 2.0;
            const holdLoops = Math.max(0, Math.floor((duration - 1.5 - 0.6) / pulseCycle));

            const pulseTl = gsap.timeline({ repeat: holdLoops, yoyo: false });
            pulseTl.fromTo(scope + ' .shield-pulse-ring', 
                { scale: 0.8, opacity: 0.7 }, 
                { scale: 1.6, opacity: 0, duration: pulseCycle * 0.7, ease: 'power2.out' }, 0);
            pulseTl.fromTo(scope + ' .milestone-pulse', 
                { scale: 1, opacity: 0.6 }, 
                { scale: 2.5, opacity: 0, duration: pulseCycle * 0.6, ease: 'power2.out', stagger: 0.1 }, 0.1);
            pulseTl.fromTo(scope + ' .light-sweep', 
                { x: '-100%' }, 
                { x: '200%', duration: pulseCycle * 0.8, ease: 'power1.inOut' }, pulseCycle * 0.1);
            
            holdStateTl.add(pulseTl);
            holdStateTl.to(scope + ' .shield-clock-path', {
                rotation: 360,
                svgOrigin: "30 30",
                duration: duration - 1.5 - 0.6,
                ease: 'none'
            }, 0);

            // --- Sub-timeline: Copy Reveal ---
            const copyTl = gsap.timeline();
            copyTl.from(scope + ' .char', {
                yPercent: 105,
                duration: 0.6,
                ease: 'power3.out',
                stagger: 0.04
            }, 0);
            copyTl.from(scope + ' .word', {
                y: 20,
                opacity: 0,
                filter: 'blur(8px)',
                duration: 0.8,
                ease: 'power4.out',
                stagger: 0.12
            }, 0.3);

            // --- Main Timeline Assembly ---
            tl.to(scope + ' .scene-root', { scale: 1.05, duration: duration, ease: 'sine.inOut' }, 0);
            tl.add(atmosphereLoopTl, 0);
            tl.add(entryExhibitTl, 0);
            tl.add(copyTl, 0.7);
            tl.add(holdStateTl, 1.5); // Add the new hold state animations

            // --- Exit Animation ---
            const exitElements = gsap.utils.toArray([
                scope + ' .timeline-exhibit',
                scope + ' .headline-wrap',
                scope + ' .caption-wrap'
            ]);
            tl.to(exitElements, {
                opacity: 0,
                duration: 0.4,
                ease: 'power2.in'
            }, duration - 0.6);

            tl.fromTo(scope + ' .exit-shield', 
                { opacity: 0, scale: 1 }, 
                { opacity: 1, scale: 30, duration: 0.6, ease: 'expo.inOut' }, 
                duration - 0.6
            );

            window.__timelines[compId] = tl;
        })();
    </script>
