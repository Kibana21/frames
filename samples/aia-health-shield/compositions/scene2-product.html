            fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.2"/>

    <style>
      [data-composition-id="scene2-product"] .s2-canvas {
        width: 1920px;
        height: 1080px;
        background: #0C0C10;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding-left: 160px;
      }
      [data-composition-id="scene2-product"] .s2-accent-top {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 7px;
        background: #DA2032;
        transform-origin: left;
      }
      [data-composition-id="scene2-product"] .s2-content {
        position: relative;
        z-index: 2;
      }
      [data-composition-id="scene2-product"] .s2-health-shield {
        font-size: 128px;
        font-weight: 800;
        color: #ffffff;
        line-height: 1;
        letter-spacing: -0.03em;
        opacity: 0;
      }
      [data-composition-id="scene2-product"] .s2-gold-rule {
        width: 0;
        height: 5px;
        background: linear-gradient(90deg, #C9A84C, #E8D5A3, #C9A84C);
        margin: 28px 0;
        border-radius: 3px;
      }
      [data-composition-id="scene2-product"] .s2-gold-max {
        font-size: 190px;
        font-weight: 900;
        color: #C9A84C;
        line-height: 1;
        letter-spacing: -0.04em;
        opacity: 0;
        transform-origin: left center;
      }
      [data-composition-id="scene2-product"] .s2-by-aia {
        font-size: 34px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.22em;
        text-transform: uppercase;
        margin-top: 28px;
        opacity: 0;
      }
      [data-composition-id="scene2-product"] .s2-shield-wrap {
        position: absolute;
        right: 180px;
        top: 50%;
        opacity: 0;
        filter: drop-shadow(0 0 60px rgba(201, 168, 76, 0.35));
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const scope = '[data-composition-id="scene2-product"]';
        const tl = gsap.timeline({ paused: true });

        gsap.set(`${scope} .s2-accent-top`, { scaleX: 0 });
        gsap.set(`${scope} .s2-health-shield`, { x: -80 });
        gsap.set(`${scope} .s2-gold-max`, { scale: 0.86 });
        gsap.set(`${scope} .s2-shield-wrap`, { translateY: "-50%", scale: 0.9 });

        tl.to(`${scope} .s2-accent-top`, { scaleX: 1, duration: 0.65, ease: "expo.out" }, 0.0);
        tl.to(`${scope} .s2-health-shield`, { opacity: 1, x: 0, duration: 0.7, ease: "expo.out" }, 0.3);
        tl.to(`${scope} .s2-gold-rule`, { width: 840, duration: 0.6, ease: "power3.out" }, 0.85);
        tl.to(`${scope} .s2-gold-max`, { opacity: 1, scale: 1, duration: 0.7, ease: "back.out(1.15)" }, 1.15);
        tl.to(`${scope} .s2-by-aia`, { opacity: 1, duration: 0.5 }, 1.75);
        tl.to(`${scope} .s2-shield-wrap`, { opacity: 1, scale: 1, duration: 0.8, ease: "power2.out" }, 1.5);
        tl.to(`${scope} .s2-shield-wrap`, { scale: 1.05, duration: 1.3, ease: "sine.inOut" }, 2.4);
        tl.to(`${scope} .s2-shield-wrap`, { scale: 1.0, duration: 1.3, ease: "sine.inOut" }, 3.7);

        tl.to(`${scope} .s2-canvas`, { opacity: 0, duration: 0.4, ease: "power2.in" }, 5.6);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene2-product"] = tl;
      })();
    </script>
