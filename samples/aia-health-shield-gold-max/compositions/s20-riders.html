<template id="scene20-riders-template">
  <div
    data-composition-id="scene20-riders"
    data-width="1920"
    data-height="1080"
    data-duration="4"
  >
    <style>
      [data-composition-id="scene20-riders"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        font-family: 'Inter', sans-serif;
        display: flex;
        align-items: center;
        overflow: hidden;
      }

      [data-composition-id="scene20-riders"] .red-stripe {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 8px;
        background: #DA2032;
      }

      [data-composition-id="scene20-riders"] .content {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding-left: 160px;
        max-width: 1400px;
      }

      [data-composition-id="scene20-riders"] .eyebrow {
        font-size: 20px;
        font-weight: 600;
        color: #DA2032;
        text-transform: uppercase;
        letter-spacing: 0.28em;
        margin-bottom: 24px;
        opacity: 0;
      }

      [data-composition-id="scene20-riders"] .headline {
        font-size: 80px;
        font-weight: 800;
        color: #ffffff;
        line-height: 1.1;
        margin-bottom: 20px;
        opacity: 0;
      }

      [data-composition-id="scene20-riders"] .badge {
        display: inline-block;
        background: linear-gradient(135deg, #C9A84C, #E8D5A3);
        color: #09090C;
        font-size: 18px;
        font-weight: 700;
        padding: 8px 24px;
        border-radius: 40px;
        margin-bottom: 36px;
        opacity: 0;
        transform-origin: left center;
      }

      [data-composition-id="scene20-riders"] .gold-rule {
        height: 5px;
        width: 0;
        background: linear-gradient(90deg, #C9A84C, #E8D5A3);
        border-radius: 2px;
        margin-bottom: 48px;
      }

      [data-composition-id="scene20-riders"] .items {
        display: flex;
        flex-direction: column;
        gap: 22px;
        margin-bottom: 48px;
      }

      [data-composition-id="scene20-riders"] .item {
        font-size: 28px;
        color: rgba(255, 255, 255, 0.75);
        display: flex;
        align-items: flex-start;
        gap: 18px;
        opacity: 0;
        line-height: 1.4;
      }

      [data-composition-id="scene20-riders"] .item-check {
        color: #C9A84C;
        font-size: 28px;
        font-weight: 700;
        flex-shrink: 0;
        margin-top: 2px;
      }

      [data-composition-id="scene20-riders"] .medisave-note {
        font-size: 20px;
        color: rgba(255, 255, 255, 0.4);
        opacity: 0;
      }

      [data-composition-id="scene20-riders"] .fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <div class="red-stripe"></div>
    <div class="content">
      <div class="eyebrow">Enhance Your Coverage</div>
      <div class="headline">AIA Max VitalHealth Pro</div>
      <div class="badge">Recommended Rider</div>
      <div class="gold-rule"></div>
      <div class="items">
        <div class="item">
          <span class="item-check">✓</span>
          <span>Full rider benefits (no co-insurance, no deductible at preferred providers)</span>
        </div>
        <div class="item">
          <span class="item-check">✓</span>
          <span>Extended cancer coverage</span>
        </div>
        <div class="item">
          <span class="item-check">✓</span>
          <span>Mental wellness benefits</span>
        </div>
        <div class="item">
          <span class="item-check">✓</span>
          <span>Home palliative care up to S$30,000 lifetime</span>
        </div>
      </div>
      <div class="medisave-note">Payable via MediSave</div>
    </div>

    <div class="fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene20-riders"]';
        const el = (cls) => document.querySelector(sc + ' ' + cls);
        const els = (cls) => document.querySelectorAll(sc + ' ' + cls);

        const tl = gsap.timeline({ paused: true });

        gsap.set(el('.eyebrow'), { opacity: 0 });
        gsap.set(el('.headline'), { x: -60, opacity: 0 });
        gsap.set(el('.badge'), { scale: 0, opacity: 0 });
        gsap.set(el('.gold-rule'), { width: 0 });
        gsap.set(els('.item'), { y: 16, opacity: 0 });
        gsap.set(el('.medisave-note'), { opacity: 0 });
        gsap.set(el('.fade'), { opacity: 0 });

        tl
          .to(el('.eyebrow'), { opacity: 1, duration: 0.15, ease: 'power2.out' }, 0)
          .to(el('.headline'), { x: 0, opacity: 1, duration: 0.6, ease: 'power3.out' }, 0.3)
          .to(el('.badge'), { scale: 1, opacity: 1, duration: 0.45, ease: 'back.out(1.4)' }, 0.5)
          .to(el('.gold-rule'), { width: 520, duration: 0.55, ease: 'power3.out' }, 0.75)
          .to(els('.item'), { y: 0, opacity: 1, duration: 0.5, ease: 'power2.out', stagger: 0.15 }, 0.9)
          .to(el('.medisave-note'), { opacity: 1, duration: 0.4, ease: 'power2.out' }, 1.65)
          .to(el('.fade'), { opacity: 1, duration: 0.4, ease: 'power2.inOut' }, 3.6);

        window.__timelines = window.__timelines || {};
        window.__timelines['scene20-riders'] = tl;
      })();
    </script>
  </div>
</template>
