<template id="scene07-medisave-template">
  <div
    data-composition-id="scene07-medisave"
    data-width="1920"
    data-height="1080"
    data-duration="3"
  >
    <style>
      [data-composition-id="scene07-medisave"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      [data-composition-id="scene07-medisave"] .badge {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        border: 3px solid #DA2032;
        border-radius: 60px;
        padding: 40px 80px;
        opacity: 0;
      }
      [data-composition-id="scene07-medisave"] .badge-check {
        font-size: 40px;
        color: #DA2032;
        line-height: 1;
      }
      [data-composition-id="scene07-medisave"] .badge-text {
        font-size: 52px;
        font-weight: 800;
        color: #ffffff;
        line-height: 1;
      }
      [data-composition-id="scene07-medisave"] .badge-desc {
        font-size: 26px;
        color: rgba(255, 255, 255, 0.6);
        margin-top: 40px;
        opacity: 0;
        text-align: center;
      }
      [data-composition-id="scene07-medisave"] .badge-small {
        font-size: 20px;
        color: #C9A84C;
        margin-top: 16px;
        opacity: 0;
        text-align: center;
      }
      [data-composition-id="scene07-medisave"] .fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <div class="badge">
      <div class="badge-check">✓</div>
      <div class="badge-text">MediSave-Approved</div>
    </div>
    <div class="badge-desc">Premiums payable with your CPF MediSave account.</div>
    <div class="badge-small">No cash out-of-pocket for basic premiums.</div>
    <div class="fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene07-medisave"]';
        const tl = gsap.timeline({ paused: true });

        gsap.set(`${sc} .badge`, { scale: 0.7, opacity: 0 });
        gsap.set(`${sc} .badge-desc`, { opacity: 0 });
        gsap.set(`${sc} .badge-small`, { opacity: 0 });
        gsap.set(`${sc} .fade`, { opacity: 0 });

        tl.to(`${sc} .badge`, { scale: 1, opacity: 1, duration: 0.6, ease: 'back.out(1.3)' }, 0.2)
          .to(`${sc} .badge-desc`, { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.6)
          .to(`${sc} .badge-small`, { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.9)
          .to(`${sc} .fade`, { opacity: 1, duration: 0.4 }, 2.6);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene07-medisave"] = tl;
      })();
    </script>
  </div>
</template>
