<template id="scene08-plans-template">
  <div
    data-composition-id="scene08-plans"
    data-width="1920"
    data-height="1080"
    data-duration="5"
  >
    <style>
      [data-composition-id="scene08-plans"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      [data-composition-id="scene08-plans"] .eyebrow {
        font-size: 20px;
        color: #DA2032;
        text-transform: uppercase;
        letter-spacing: 0.28em;
        font-weight: 600;
        opacity: 0;
        margin-bottom: 48px;
      }
      [data-composition-id="scene08-plans"] .cards-row {
        display: flex;
        gap: 32px;
        align-items: flex-start;
      }
      [data-composition-id="scene08-plans"] .card {
        width: 420px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 44px;
        box-sizing: border-box;
        opacity: 0;
        position: relative;
        overflow: hidden;
      }
      [data-composition-id="scene08-plans"] .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: #DA2032;
        transform: scaleX(0);
        transform-origin: left;
      }
      [data-composition-id="scene08-plans"] .card-plan-label {
        font-size: 22px;
        color: #DA2032;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-weight: 700;
        margin-bottom: 12px;
      }
      [data-composition-id="scene08-plans"] .card-amount {
        font-size: 72px;
        font-weight: 900;
        color: #ffffff;
        line-height: 1;
        letter-spacing: -0.02em;
      }
      [data-composition-id="scene08-plans"] .card-period {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 6px;
      }
      [data-composition-id="scene08-plans"] .card-ward {
        font-size: 20px;
        color: #C9A84C;
        font-weight: 600;
        margin-top: 16px;
      }
      [data-composition-id="scene08-plans"] .card-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin: 16px 0;
      }
      [data-composition-id="scene08-plans"] .card-lifetime {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.35);
      }
      [data-composition-id="scene08-plans"] .fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <div class="eyebrow">Choose your level of coverage</div>
    <div class="cards-row">
      <div class="card card1">
        <div class="card-plan-label">Plan A</div>
        <div class="card-amount">S$2,000,000</div>
        <div class="card-period">Per policy year</div>
        <div class="card-ward">Private Hospital</div>
        <div class="card-divider"></div>
        <div class="card-lifetime">Unlimited lifetime</div>
      </div>
      <div class="card card2">
        <div class="card-plan-label">Plan B</div>
        <div class="card-amount">S$1,000,000</div>
        <div class="card-period">Per policy year</div>
        <div class="card-ward">Class A Ward</div>
        <div class="card-divider"></div>
        <div class="card-lifetime">Restructured hospitals</div>
      </div>
      <div class="card card3">
        <div class="card-plan-label">Plan B Lite</div>
        <div class="card-amount">S$500,000</div>
        <div class="card-period">Per policy year</div>
        <div class="card-ward">Class A Ward</div>
        <div class="card-divider"></div>
        <div class="card-lifetime">Lower premiums</div>
      </div>
    </div>
    <div class="fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene08-plans"]';
        const tl = gsap.timeline({ paused: true });

        gsap.set(`${sc} .eyebrow`, { opacity: 0 });
        gsap.set(`${sc} .card1`, { y: 40, opacity: 0 });
        gsap.set(`${sc} .card2`, { y: 40, opacity: 0 });
        gsap.set(`${sc} .card3`, { y: 40, opacity: 0 });
        gsap.set(`${sc} .card::before`, { scaleX: 0 });
        gsap.set(`${sc} .fade`, { opacity: 0 });

        tl.to(`${sc} .eyebrow`, { opacity: 1, duration: 0.4, ease: 'power2.out' }, 0.2)
          .to(`${sc} .card1`, { y: 0, opacity: 1, duration: 0.55, ease: 'power3.out' }, 0.5)
          .to(`${sc} .card1::before`, { scaleX: 1, duration: 0.3, ease: 'power2.out' }, 0.8)
          .to(`${sc} .card2`, { y: 0, opacity: 1, duration: 0.55, ease: 'power3.out' }, 0.75)
          .to(`${sc} .card2::before`, { scaleX: 1, duration: 0.3, ease: 'power2.out' }, 1.05)
          .to(`${sc} .card3`, { y: 0, opacity: 1, duration: 0.55, ease: 'power3.out' }, 1.0)
          .to(`${sc} .card3::before`, { scaleX: 1, duration: 0.3, ease: 'power2.out' }, 1.3)
          .to(`${sc} .fade`, { opacity: 1, duration: 0.4 }, 4.6);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene08-plans"] = tl;
      })();
    </script>
  </div>
</template>
