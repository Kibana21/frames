<template id="scene04-intro-template">
  <div
    data-composition-id="scene04-intro"
    data-width="1920"
    data-height="1080"
    data-duration="3"
  >
    <style>
      [data-composition-id="scene04-intro"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      [data-composition-id="scene04-intro"] .introducing {
        font-size: 24px;
        color: #C9A84C;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        font-weight: 500;
        opacity: 0;
        margin-bottom: 24px;
      }
      [data-composition-id="scene04-intro"] .aia-healthshield {
        font-size: 100px;
        font-weight: 800;
        color: #ffffff;
        line-height: 1;
        opacity: 0;
        text-align: center;
      }
      [data-composition-id="scene04-intro"] .gold-max {
        font-size: 140px;
        font-weight: 900;
        color: #C9A84C;
        letter-spacing: -0.04em;
        line-height: 1;
        opacity: 0;
        text-align: center;
      }
      [data-composition-id="scene04-intro"] .small-label {
        font-size: 20px;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-top: 28px;
        opacity: 0;
      }
      [data-composition-id="scene04-intro"] .fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <div class="introducing">Introducing</div>
    <div class="aia-healthshield">AIA HealthShield</div>
    <div class="gold-max">Gold Max</div>
    <div class="small-label">Integrated Shield Plan</div>
    <div class="fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene04-intro"]';
        const tl = gsap.timeline({ paused: true });

        gsap.set(`${sc} .introducing`, { opacity: 0 });
        gsap.set(`${sc} .aia-healthshield`, { x: -60, opacity: 0 });
        gsap.set(`${sc} .gold-max`, { scale: 0.88, opacity: 0 });
        gsap.set(`${sc} .small-label`, { opacity: 0 });
        gsap.set(`${sc} .fade`, { opacity: 0 });

        tl.to(`${sc} .introducing`, { opacity: 1, duration: 0.4, ease: 'power2.out' }, 0)
          .to(`${sc} .aia-healthshield`, { x: 0, opacity: 1, duration: 0.6, ease: 'power3.out' }, 0.4)
          .to(`${sc} .gold-max`, { scale: 1, opacity: 1, duration: 0.6, ease: 'back.out(1.2)' }, 0.75)
          .to(`${sc} .small-label`, { opacity: 1, duration: 0.5, ease: 'power2.out' }, 1.1)
          .to(`${sc} .fade`, { opacity: 1, duration: 0.4 }, 2.6);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene04-intro"] = tl;
      })();
    </script>
  </div>
</template>
