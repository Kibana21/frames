<template id="scene28-kinetic-template">

      [data-composition-id="scene28-kinetic"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
      }
      [data-composition-id="scene28-kinetic"] .phase {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        top: 50%;
        transform: translateY(-50%);
      }
      [data-composition-id="scene28-kinetic"] .word-gold {
        font-size: 200px;
        font-weight: 900;
        color: #fff;
        line-height: 1;

      [data-composition-id="scene28-kinetic"] .sub-gold {
        font-size: 28px;
        font-weight: 400;
        color: rgba(255,255,255,0.5);
        letter-spacing: 0.1em;
        margin-top: 16px;

      }
      [data-composition-id="scene28-kinetic"] .word-max {
        font-size: 200px;
        font-weight: 900;
        color: #C9A84C;
        line-height: 1;
        opacity: 0;

        font-weight: 400;

    <div class="phase" id="s28-phase1">
      <div class="word-gold" id="s28-gold">Gold.</div>
      <div class="sub-gold" id="s28-sub-gold">The standard of excellence.</div>
    </div>

      <div class="word-max" id="s28-max">Max.</div>
      <div class="sub-max" id="s28-sub-max">Maximum protection.</div>
    </div>

    <div class="fade" id="s28-fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene28-kinetic"]';
        const tl = gsap.timeline({ paused: true });

        // Phase 1: Gold
        tl.to(sc + ' #s28-gold', { opacity: 1, x: 0, duration: 0.5, ease: 'power3.out' }, 0.0)

          .to(sc + ' #s28-redline', { width: 1920, duration: 0.8, ease: 'power2.inOut' }, 0.3)

          .to(sc + ' #s28-gold', { opacity: 0, duration: 0.35, ease: 'power2.in' }, 1.5)
          .to(sc + ' #s28-sub-gold', { opacity: 0, duration: 0.3 }, 1.5)
          // Phase 2: Max slides in
          .to(sc + ' #s28-max', { opacity: 1, x: 0, duration: 0.5, ease: 'power3.out' }, 1.8)
          .to(sc + ' #s28-sub-max', { opacity: 1, duration: 0.4 }, 2.1)
          .to(sc + ' #s28-fade', { opacity: 1, duration: 0.4 }, 3.6);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene28-kinetic"] = tl;
      })();
