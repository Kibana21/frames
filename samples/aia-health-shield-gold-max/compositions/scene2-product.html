<template id="scene2-product-template">
  <div
    data-composition-id="scene2-product"
    data-width="1920"
    data-height="1080"
    data-duration="5"
  >
    <div class="s2-canvas">
      <!-- Left red accent stripe -->
      <div class="s2-stripe"></div>

      <!-- Left text block -->
      <div class="s2-left">
        <div class="s2-eyebrow">Integrated Shield Plan · MediSave-Approved</div>
        <div class="s2-name-wrap">
          <div class="s2-aia-health">AIA HealthShield</div>
          <div class="s2-gold-line"></div>
          <div class="s2-gold-max">Gold Max</div>
        </div>
        <div class="s2-tagline">Singapore's most comprehensive<br/>hospitalisation coverage.</div>
      </div>

      <!-- Right shield graphic -->
      <div class="s2-right">
        <div class="s2-shield-glow"></div>
        <svg class="s2-shield-svg" viewBox="0 0 220 260" width="440" height="520">
          <!-- Outer ring -->
          <circle cx="110" cy="130" r="108" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.15"/>
          <!-- Main shield -->
          <path d="M110 12 L198 46 L198 130 C198 178 160 216 110 232 C60 216 22 178 22 130 L22 46 Z"
            fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round"/>
          <!-- Inner shield -->
          <path d="M110 32 L178 60 L178 130 C178 168 150 200 110 212 C70 200 42 168 42 130 L42 60 Z"
            fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linejoin="round" opacity="0.5"/>
          <!-- Innermost shield -->
          <path d="M110 52 L158 74 L158 130 C158 158 140 182 110 192 C80 182 62 158 62 130 L62 74 Z"
            fill="none" stroke="#C9A84C" stroke-width="1" stroke-linejoin="round" opacity="0.25"/>
          <!-- Center cross -->
          <line x1="110" y1="95" x2="110" y2="165" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
          <line x1="75"  y1="130" x2="145" y2="130" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        </svg>
      </div>

      <!-- Fade overlay -->
      <div class="s2-fade"></div>
    </div>

    <style>
      [data-composition-id="scene2-product"] .s2-canvas {
        width: 1920px;
        height: 1080px;
        background: #09090C;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
      }
      [data-composition-id="scene2-product"] .s2-stripe {
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 8px;
        background: #DA2032;
        transform-origin: top;
      }
      [data-composition-id="scene2-product"] .s2-left {
        flex: 0 0 auto;
        padding-left: 100px;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }
      [data-composition-id="scene2-product"] .s2-eyebrow {
        font-size: 20px;
        font-weight: 500;
        color: #DA2032;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        opacity: 0;
      }
      [data-composition-id="scene2-product"] .s2-name-wrap {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      [data-composition-id="scene2-product"] .s2-aia-health {
        font-size: 100px;
        font-weight: 800;
        color: #ffffff;
        line-height: 1;
        letter-spacing: -0.03em;
        opacity: 0;
      }
      [data-composition-id="scene2-product"] .s2-gold-line {
        width: 0;
        height: 5px;
        background: linear-gradient(90deg, #C9A84C 0%, #E8D5A3 50%, #C9A84C 100%);
        margin: 20px 0;
        border-radius: 3px;
      }
      [data-composition-id="scene2-product"] .s2-gold-max {
        font-size: 200px;
        font-weight: 900;
        color: #C9A84C;
        line-height: 0.9;
        letter-spacing: -0.05em;
        opacity: 0;
        transform-origin: left center;
      }
      [data-composition-id="scene2-product"] .s2-tagline {
        font-size: 28px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.5;
        opacity: 0;
      }
      [data-composition-id="scene2-product"] .s2-right {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      [data-composition-id="scene2-product"] .s2-shield-glow {
        position: absolute;
        width: 380px;
        height: 380px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(201,168,76,0.18) 0%, transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0;
      }
      [data-composition-id="scene2-product"] .s2-shield-svg {
        opacity: 0;
        filter: drop-shadow(0 0 30px rgba(201,168,76,0.3));
      }
      [data-composition-id="scene2-product"] .s2-fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene2-product"]';
        const tl = gsap.timeline({ paused: true });

        gsap.set(`${sc} .s2-stripe`, { scaleY: 0 });
        gsap.set(`${sc} .s2-aia-health`, { x: -60 });
        gsap.set(`${sc} .s2-gold-max`, { scale: 0.88 });
        gsap.set(`${sc} .s2-shield-svg`, { scale: 0.85 });

        tl.to(`${sc} .s2-stripe`, { scaleY: 1, duration: 0.55, ease: "expo.out" }, 0.0);
        tl.to(`${sc} .s2-eyebrow`, { opacity: 1, duration: 0.5 }, 0.2);
        tl.to(`${sc} .s2-aia-health`, { opacity: 1, x: 0, duration: 0.65, ease: "expo.out" }, 0.4);
        tl.to(`${sc} .s2-gold-line`, { width: 870, duration: 0.6, ease: "power3.out" }, 0.85);
        tl.to(`${sc} .s2-gold-max`, { opacity: 1, scale: 1, duration: 0.7, ease: "back.out(1.2)" }, 1.1);
        tl.to(`${sc} .s2-tagline`, { opacity: 1, duration: 0.6 }, 1.65);
        tl.to(`${sc} .s2-shield-glow`, { opacity: 1, duration: 0.8 }, 1.3);
        tl.to(`${sc} .s2-shield-svg`, { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.1)" }, 1.3);
        /* Gentle breathe — finite: grow then return */
        tl.to(`${sc} .s2-shield-svg`, { scale: 1.04, duration: 1.2, ease: "sine.inOut" }, 2.4);
        tl.to(`${sc} .s2-shield-svg`, { scale: 1.0, duration: 1.1, ease: "sine.inOut" }, 3.6);

        tl.to(`${sc} .s2-fade`, { opacity: 1, duration: 0.45, ease: "power2.in" }, 4.55);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene2-product"] = tl;
      })();
    </script>
  </div>
</template>
