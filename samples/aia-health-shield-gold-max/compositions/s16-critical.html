<template id="scene16-critical-template">
  <div
    data-composition-id="scene16-critical"
    data-width="1920"
    data-height="1080"
    data-duration="4"
  >
    <style>
      [data-composition-id="scene16-critical"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        font-family: 'Inter', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        overflow: hidden;
      }

      [data-composition-id="scene16-critical"] .left-col {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding-left: 140px;
        flex: 0 0 auto;
        width: 420px;
      }

      [data-composition-id="scene16-critical"] .big-num {
        font-size: 220px;
        font-weight: 900;
        color: #DA2032;
        line-height: 1;
        opacity: 0;
        margin-bottom: 8px;
      }

      [data-composition-id="scene16-critical"] .crit-label {
        font-size: 32px;
        color: #ffffff;
        font-weight: 500;
        opacity: 0;
      }

      [data-composition-id="scene16-critical"] .covered-label {
        font-size: 32px;
        color: rgba(255, 255, 255, 0.5);
        font-weight: 400;
        opacity: 0;
      }

      [data-composition-id="scene16-critical"] .v-rule {
        width: 4px;
        height: 0;
        background: linear-gradient(180deg, #C9A84C, #E8D5A3);
        border-radius: 2px;
        margin: 0 60px;
        flex-shrink: 0;
        align-self: center;
      }

      [data-composition-id="scene16-critical"] .mid-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: center;
        justify-content: center;
        padding: 0 20px;
      }

      [data-composition-id="scene16-critical"] .pills-grid {
        display: grid;
        grid-template-columns: repeat(3, auto);
        gap: 14px;
        justify-content: center;
      }

      [data-composition-id="scene16-critical"] .pill {
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        padding: 8px 20px;
        font-size: 18px;
        color: rgba(255, 255, 255, 0.6);
        opacity: 0;
        white-space: nowrap;
      }

      [data-composition-id="scene16-critical"] .v-rule2 {
        width: 4px;
        height: 0;
        background: linear-gradient(180deg, #C9A84C, #E8D5A3);
        border-radius: 2px;
        margin: 0 60px;
        flex-shrink: 0;
        align-self: center;
      }

      [data-composition-id="scene16-critical"] .right-col {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        flex: 0 0 auto;
        width: 360px;
        padding-right: 140px;
        opacity: 0;
      }

      [data-composition-id="scene16-critical"] .up-to {
        font-size: 20px;
        color: #C9A84C;
        font-weight: 500;
        margin-bottom: 8px;
      }

      [data-composition-id="scene16-critical"] .amount {
        font-size: 72px;
        font-weight: 900;
        color: #ffffff;
        line-height: 1;
        margin-bottom: 12px;
      }

      [data-composition-id="scene16-critical"] .per-year {
        font-size: 22px;
        color: rgba(255, 255, 255, 0.5);
      }

      [data-composition-id="scene16-critical"] .fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <div class="left-col">
      <div class="big-num">30</div>
      <div class="crit-label">critical illnesses</div>
      <div class="covered-label">covered</div>
    </div>

    <div class="v-rule"></div>

    <div class="mid-col">
      <div class="pills-grid">
        <div class="pill">Heart Attack</div>
        <div class="pill">Stroke</div>
        <div class="pill">Cancer</div>
        <div class="pill">Kidney Failure</div>
        <div class="pill">Major Burns</div>
        <div class="pill">Coma</div>
        <div class="pill">Blindness</div>
        <div class="pill">Deafness</div>
        <div class="pill">Paralysis</div>
      </div>
    </div>

    <div class="v-rule2"></div>

    <div class="right-col">
      <div class="up-to">Up to</div>
      <div class="amount">S$100,000</div>
      <div class="per-year">per policy year</div>
    </div>

    <div class="fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene16-critical"]';
        const el = (cls) => document.querySelector(sc + ' ' + cls);
        const els = (cls) => document.querySelectorAll(sc + ' ' + cls);

        const tl = gsap.timeline({ paused: true });

        gsap.set(el('.big-num'), { y: -60, opacity: 0 });
        gsap.set(el('.crit-label'), { opacity: 0 });
        gsap.set(el('.covered-label'), { opacity: 0 });
        gsap.set(el('.v-rule'), { height: 0 });
        gsap.set(el('.v-rule2'), { height: 0 });
        gsap.set(els('.pill'), { opacity: 0 });
        gsap.set(el('.right-col'), { opacity: 0 });
        gsap.set(el('.fade'), { opacity: 0 });

        tl
          .to(el('.big-num'), { y: 0, opacity: 1, duration: 0.55, ease: 'expo.out' }, 0.2)
          .to(el('.crit-label'), { opacity: 1, duration: 0.45, ease: 'power2.out' }, 0.5)
          .to(el('.covered-label'), { opacity: 1, duration: 0.45, ease: 'power2.out' }, 0.6)
          .to(el('.v-rule'), { height: 200, duration: 0.5, ease: 'power3.out' }, 0.4)
          .to(el('.v-rule2'), { height: 200, duration: 0.5, ease: 'power3.out' }, 0.4)
          .to(els('.pill'), { opacity: 1, duration: 0.35, ease: 'power2.out', stagger: 0.08 }, 0.6)
          .to(el('.right-col'), { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.9)
          .to(el('.fade'), { opacity: 1, duration: 0.4, ease: 'power2.inOut' }, 3.6);

        window.__timelines = window.__timelines || {};
        window.__timelines['scene16-critical'] = tl;
      })();
    </script>
  </div>
</template>
