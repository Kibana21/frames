<template id="scene32-tagline-template">
  <div
    data-composition-id="scene32-tagline"
    data-width="1920"
    data-height="1080"
    data-duration="3.5"
  >
    <style>
      [data-composition-id="scene32-tagline"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
      }
      [data-composition-id="scene32-tagline"] .red-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: #DA2032;
        transform-origin: left center;
        transform: scaleX(0);
      }
      [data-composition-id="scene32-tagline"] .word {
        font-size: 120px;
        font-weight: 900;
        line-height: 1.05;
        opacity: 0;
      }
      [data-composition-id="scene32-tagline"] .word-healthier {
        color: #fff;
        transform: translateX(-80px);
      }
      [data-composition-id="scene32-tagline"] .word-longer {
        color: #fff;
        transform: translateX(80px);
      }
      [data-composition-id="scene32-tagline"] .word-better {
        color: #DA2032;
        transform: translateY(60px);
      }
      [data-composition-id="scene32-tagline"] .aia-label {
        font-size: 20px;
        font-weight: 400;
        color: rgba(255,255,255,0.4);
        letter-spacing: 0.4em;
        text-transform: uppercase;
        margin-top: 32px;
        opacity: 0;
      }
      [data-composition-id="scene32-tagline"] .fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <div class="red-bar" id="s32-redbar"></div>
    <div class="word word-healthier" id="s32-healthier">Healthier.</div>
    <div class="word word-longer" id="s32-longer">Longer.</div>
    <div class="word word-better" id="s32-better">Better Lives.</div>
    <div class="aia-label" id="s32-aia">AIA</div>
    <div class="fade" id="s32-fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene32-tagline"]';
        const tl = gsap.timeline({ paused: true });

        tl.to(sc + ' #s32-redbar', { scaleX: 1, duration: 0.5, ease: 'power2.inOut' }, 0.0)
          .to(sc + ' #s32-healthier', { opacity: 1, x: 0, duration: 0.5, ease: 'power3.out' }, 0.3)
          .to(sc + ' #s32-longer', { opacity: 1, x: 0, duration: 0.5, ease: 'power3.out' }, 0.55)
          .to(sc + ' #s32-better', { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' }, 0.8)
          .to(sc + ' #s32-aia', { opacity: 1, duration: 0.45 }, 1.2)
          .to(sc + ' #s32-fade', { opacity: 1, duration: 0.4 }, 3.1);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene32-tagline"] = tl;
      })();
    </script>
  </div>
</template>
