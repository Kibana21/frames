<template id="scene02-hook-template">
  <div
    data-composition-id="scene02-hook"
    data-width="1920"
    data-height="1080"
    data-duration="3.5"
  >
    <style>
      [data-composition-id="scene02-hook"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #09090C;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }
      [data-composition-id="scene02-hook"] .line1 {
        font-size: 80px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.1;
        opacity: 0;
        text-align: center;
      }
      [data-composition-id="scene02-hook"] .line2 {
        font-size: 80px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.1;
        opacity: 0;
        text-align: center;
      }
      [data-composition-id="scene02-hook"] .red-rule {
        width: 0px;
        height: 1px;
        background: #DA2032;
        margin: 32px 0 28px 0;
      }
      [data-composition-id="scene02-hook"] .subtext {
        font-size: 28px;
        color: rgba(255, 255, 255, 0.6);
        opacity: 0;
        text-align: center;
      }
      [data-composition-id="scene02-hook"] .fade {
        position: absolute;
        inset: 0;
        background: #09090C;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <div class="line1">Life can change</div>
    <div class="line2">in an instant.</div>
    <div class="red-rule"></div>
    <div class="subtext">What matters is being prepared.</div>
    <div class="fade"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const sc = '[data-composition-id="scene02-hook"]';
        const tl = gsap.timeline({ paused: true });

        gsap.set(`${sc} .line1`, { y: 60, opacity: 0 });
        gsap.set(`${sc} .line2`, { y: 60, opacity: 0 });
        gsap.set(`${sc} .red-rule`, { width: 0 });
        gsap.set(`${sc} .subtext`, { opacity: 0 });
        gsap.set(`${sc} .fade`, { opacity: 0 });

        tl.to(`${sc} .line1`, { y: 0, opacity: 1, duration: 0.6, ease: 'power3.out' }, 0)
          .to(`${sc} .line2`, { y: 0, opacity: 1, duration: 0.6, ease: 'power3.out' }, 0.15)
          .to(`${sc} .red-rule`, { width: 600, duration: 0.5, ease: 'power2.out' }, 0.7)
          .to(`${sc} .subtext`, { opacity: 1, duration: 0.5, ease: 'power2.out' }, 1.0)
          .to(`${sc} .fade`, { opacity: 1, duration: 0.4 }, 3.1);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene02-hook"] = tl;
      })();
    </script>
  </div>
</template>
